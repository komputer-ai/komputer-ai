apiVersion: komputer.komputer.ai/v1alpha1
kind: KomputerAgent
metadata:
  name: research-manager
spec:
  role: manager
  instructions: >
    Produce a comprehensive report on the current state of AI in healthcare,
    covering medical imaging, drug discovery, and patient care coordination.
    Save the final executive summary to /workspace/ai-healthcare-report.md.
  model: claude-opus-4-7
